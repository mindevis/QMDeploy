# Вызывается из CI репозиториев приложений после push образа в GHCR.
# Секрет QMDEPLOY_BUMP_TOKEN: PAT с правом push в репозиторий QMDeploy (contents: write).

name: Bump QMDeploy Helm image (GitOps)

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
        description: "Ключ images.* в чарте (qmdocs, qmadmin, qmweb, qmserver, qmnetwork)"
      image_ref:
        required: true
        type: string
        description: "Полная ссылка ghcr.io/owner/name:tag"
      qmdeploy_repository:
        required: false
        type: string
        default: mindevis/QMDeploy
    secrets:
      QMDEPLOY_BUMP_TOKEN:
        description: PAT для push в QMDeploy
        required: true

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.qmdeploy_repository }}
          token: ${{ secrets.QMDEPLOY_BUMP_TOKEN }}
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install script deps
        run: pip install -r scripts/requirements-gitops.txt

      - name: Patch helm/qm-project/values-argocd.yaml
        run: >-
          python3 scripts/bump-qmdeploy-helm-image.py
          --service "${{ inputs.service }}"
          --image-ref "${{ inputs.image_ref }}"

      - name: Commit and push
        env:
          SERVICE: ${{ inputs.service }}
          REF: ${{ inputs.image_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm/qm-project/values-argocd.yaml
          if git diff --cached --quiet; then
            echo "Нет изменений (тот же image ref) — пропуск push."
            exit 0
          fi
          git commit -m "chore(gitops): bump ${SERVICE} image to ${REF}"
          git push
