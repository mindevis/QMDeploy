# Вызывается из CI репозиториев приложений после push образа в GHCR.
# Секрет QMDEPLOY_BUMP_TOKEN: PAT с правом push в репозиторий QMDeploy (contents: write).

name: Bump QMDeploy Helm image (GitOps)

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
        description: "Ключ images.* в чарте (qmdocs, qmadmin, qmweb, qmserver, qmnetwork, qmsecret)"
      image_ref:
        required: true
        type: string
        description: "Референс сборки (в коммите; в values пишется imageTag latest без пина SHA)"
      qmdeploy_repository:
        required: false
        type: string
        default: mindevis/QMDeploy
    secrets:
      QMDEPLOY_BUMP_TOKEN:
        description: PAT для push в QMDeploy
        required: true

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.qmdeploy_repository }}
          token: ${{ secrets.QMDEPLOY_BUMP_TOKEN }}
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install script deps
        run: pip install -r scripts/requirements-gitops.txt

      - name: Patch values and push (retry on concurrent bumps)
        env:
          SERVICE: ${{ inputs.service }}
          REF: ${{ inputs.image_ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Несколько репозиториев могут одновременно бампнуть values-argocd.yaml.
          # Rebase старого коммита даёт конфликт; вместо этого каждый раз берём origin/main
          # и заново применяем bump-qmdeploy-helm-image.py, затем push.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            python3 scripts/bump-qmdeploy-helm-image.py \
              --service "${SERVICE}" \
              --image-ref "${REF}"
            git add helm/qm-project/values-argocd.yaml
            if git diff --cached --quiet; then
              echo "Нет изменений (уже актуальный image ref) — пропуск push."
              exit 0
            fi
            git commit -m "chore(gitops): imageTag latest (${SERVICE} build ${REF})"
            if git push origin HEAD:main; then
              echo "Push OK."
              exit 0
            fi
            echo "Push отклонён (attempt ${attempt}/5), повтор…"
            sleep $((attempt * 4))
          done
          echo "Push не удался после 5 попыток." >&2
          exit 1
