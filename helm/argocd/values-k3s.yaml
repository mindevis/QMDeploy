# Argo CD — значения по умолчанию для K3s + Traefik (как ingress у qm-project: className traefik).
# Домен задаётся в k8s-manage.py addons/bootstrap: --argocd-host (по умолчанию k3s.qx-dev.ru) → global.domain.
configs:
  params:
    # TLS на Ingress (Traefik); бэкенд Argo CD — HTTP внутри кластера
    "server.insecure": "true"

server:
  ingress:
    enabled: true
    ingressClassName: traefik
