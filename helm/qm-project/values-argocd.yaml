# Значения по умолчанию для Argo CD Application (GitOps) — см. helm/argocd/applications/
# Домены как в QMDocs (qx-dev). Переопределите в своём values или в UI Argo CD.
#
# Образы: пустая строка в images.* → ghcr.io/<ghcrOwner>/<service>:<imageTag> (см. templates/_helpers.tpl).
# Здесь явно latest, без пинов по SHA. Чтобы зафиксировать тег, задайте images.<сервис>: "ghcr.io/...:tag"
# или отдельный overlay / bump-qmdeploy-helm-image.py.
ghcrOwner: mindevis
imageTag: latest
images:
  qmserver: ""
  qmadmin: ""
  qmweb: ""
  qmdocs: ""

# Заполняется CI (bump): меняется при новой сборке, чтобы Argo синкнул rollout без пина образа в spec.
imageRevisions:
  qmserver: "62ba60e"
  qmadmin: "eccc9ab"
  qmweb: "ebe28e7"
  qmdocs: "967b3ae"

# kubectl create secret docker-registry ghcr-credentials -n qm --docker-server=ghcr.io --docker-username=... --docker-password=...
imagePullSecrets:
- name: ghcr-credentials

ingress:
  hosts:
    api: api.qx-dev.ru
    admin: admin.qx-dev.ru
    web: web.qx-dev.ru
    docs: qm.qx-dev.ru
    grafana: monit.qx-dev.ru
    phpmyadmin: pma.qx-dev.ru

# phpMyAdmin к MySQL (выключен по умолчанию). Включите: phpmyadmin.enabled: true и Sync.
phpmyadmin:
  enabled: false

# Postfix relay (остальные поля — из values.yaml).
# SMTP relay: чарт создаёт smtp-relay-auth (noreply@… + пароль); см. smtpRelay.relayUserEmail в values.yaml.
smtpRelay:
  enabled: true

# Grafana / Prometheus / exporters: выключено по умолчанию (поды не создаются).
# Включите в Git (коммит в QMDeploy) или через параметры Application в Argo CD, затем Sync.
monitoring:
  enabled: false
