# Значения по умолчанию для Argo CD Application (GitOps) — см. helm/argocd/applications/
# Домены как в QMDocs (qx-dev). Переопределите в своём values или в UI Argo CD.
#
# Образы: пустая строка = из values.yaml (ghcr.io/<ghcrOwner>/<service>:<imageTag>).
# CI приложений коммитит сюда полный ref (scripts/bump-qmdeploy-helm-image.py).
images:
  qmserver: "ghcr.io/mindevis/qmserver:5042477"
  qmadmin: "ghcr.io/mindevis/qmadmin:b2816e6"
  qmweb: "ghcr.io/mindevis/qmweb:639cc13"
  qmdocs: "ghcr.io/mindevis/qmdocs:1.0.8"
  qmnetwork: "ghcr.io/mindevis/qmnetwork:6090945"
  qmsecret: "ghcr.io/mindevis/qmsecret:03b279b"

# kubectl create secret docker-registry ghcr-credentials -n qm --docker-server=ghcr.io --docker-username=... --docker-password=...
imagePullSecrets:
  - name: ghcr-credentials

ingress:
  hosts:
    api: api.qx-dev.ru
    admin: admin.qx-dev.ru
    web: web.qx-dev.ru
    docs: qm.qx-dev.ru
    auth: auth.qx-dev.ru
    key: key.qx-dev.ru
    grafana: monit.qx-dev.ru

# Включает Deployment/Service/Ingress для QMSecret и Postfix relay (остальные поля — из values.yaml).
# Обязательно создайте Secret qm-app в namespace релиза: QMSECRET_MASTER_KEY, QMSECRET_SERVICE_TOKEN,
# для smtp-relay — SMTP_RELAY_USERS (формат user:password для boky/postfix).
qmsecret:
  enabled: true

smtpRelay:
  enabled: true
