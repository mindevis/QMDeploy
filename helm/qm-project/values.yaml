# Namespace for the release (helm install -n qm must match)
namespace: qm

# Create Namespace resource (safe if namespace already exists)
createNamespace: true

# PVC qmserver-data / qmweb-uploads. Set false if those PVCs already exist from a prior install.
persistence:
  create: true

# ghcr.io/<ghcrOwner>/<service>:<imageTag> when images.<service> is empty
ghcrOwner: mindevis
imageTag: latest

# Override full image refs (non-empty = use as-is)
images:
  qmserver: ""
  qmadmin: ""
  qmweb: ""
  qmdocs: ""

# Тег/ревизия образа из CI (short SHA и т.д.): bump-qmdeploy выставляет imageRevisions.<сервис>,
# чтобы при :latest менялась аннотация пода и Argo выкатывал новый digest.
imageRevisions:
  qmserver: ""
  qmadmin: ""
  qmweb: ""
  qmdocs: ""

# Uncomment after creating the secret (same as flat manifests):
# imagePullSecrets:
#   - name: ghcr-credentials
imagePullSecrets: []

# Ingress (Traefik on K3s)
ingress:
  className: traefik
  # Large multipart (QMAdmin → QMServer bulk-upload): apply Middleware then reference it, e.g.
  #   kubectl apply -f helm/qm-project/extras/traefik-middleware-large-post.yaml
  # annotations:
  #   traefik.ingress.kubernetes.io/router.middlewares: qm-large-post@kubernetescrd
  # (namespace-middlewarename@kubernetescrd — use your release namespace if not "qm".)
  # For **nginx** ingress controller instead of Traefik, use e.g.:
  #   nginx.ingress.kubernetes.io/proxy-body-size: "700m"
  #   nginx.ingress.kubernetes.io/proxy-read-timeout: "7200"
  #   nginx.ingress.kubernetes.io/proxy-send-timeout: "7200"
  annotations: {}
  tls:
    enabled: false
    secretName: qm-tls-wildcard
  hosts:
    api: api.example.com
    admin: admin.example.com
    web: web.example.com
    docs: docs.example.com
    # Grafana (включите monitoring.enabled). Пароль админа: Secret qm-app → GRAFANA_ADMIN_PASSWORD или monitoring.grafana.adminPasswordPlain в values.
    grafana: monit.qx-dev.ru
    # phpMyAdmin (включите phpmyadmin.enabled). В продакшене ограничьте доступ (firewall / VPN / BasicAuth).
    phpmyadmin: pma.qx-dev.ru

mysql:
  image: percona/percona-server:8.0
  # z-qm.cnf из ConfigMap mysql-config: для Percona путь drop-in — /etc/my.cnf.d/ (не /etc/mysql/conf.d).
  storage: 20Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

# Опциональный phpMyAdmin к Service **mysql** (тот же namespace). По умолчанию **выключен**.
phpmyadmin:
  enabled: false
  image: phpmyadmin/phpmyadmin:5.2
  imagePullPolicy: IfNotPresent
  mysqlHost: mysql
  mysqlPort: "3306"
  # true — подставить MYSQL_USER / MYSQL_PASSWORD из Secret qm-mysql (права как у приложения, не root).
  preloadAppCredentials: false
  publicUrlScheme: https
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

qmserver:
  pvc:
    storage: 10Gi
  progressDeadlineSeconds: 900
  hostNetwork: true
  config:
    appName: "QMServer Cloud"
    port: "8080"
    ginMode: release
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "2"
      memory: 1Gi

qmadmin:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

qmweb:
  pvc:
    storage: 5Gi
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

qmdocs:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Опциональный Postfix в кластере (отправка с вашего домена). При smtpRelay.enabled чарт создаёт Secret smtp-relay-auth.

# Опциональный мониторинг: Prometheus + Grafana + mysqld-exporter + blackbox (HTTP /health QMServer). Только внутри кластера + Ingress для Grafana.
monitoring:
  enabled: false
  prometheus:
    image: prom/prometheus:v2.55.1
    scrapeInterval: 30s
    retention: 15d
    persistence:
      storage: 10Gi
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi
  grafana:
    image: grafana/grafana:11.4.0
    adminUser: admin
    # Пусто — брать пароль из Secret qm-app (ключ GRAFANA_ADMIN_PASSWORD). Только для отладки:
    adminPasswordPlain: ""
    rootUrlScheme: https
    # Плагины через запятую, например: grafana-clock-panel
    installPlugins: ""
    persistence:
      storage: 2Gi
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 2Gi
  mysqlExporter:
    image: prom/mysqld-exporter:v0.16.0
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
  blackboxExporter:
    image: prom/blackbox-exporter:v0.25.0
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 500m
        memory: 128Mi

smtpRelay:
  enabled: false
  image: docker.io/boky/postfix:latest
  allowedSenderDomains: "qx-dev.ru"
  # HELO/EHLO и связанные заголовки; для доставляемости настройте DNS ниже.
  hostname: smtp.qx-dev.ru
  # Логин SMTP AUTH (домен должен совпадать с allowedSenderDomains / вашим доменом).
  relayUserEmail: noreply@qx-dev.ru
  # Если не пусто — полная строка user:password (перекрывает автогенерацию). Иначе пароль = первые 32 hex-символа sha256(release|namespace|email).
  smtpRelayUsersPlain: ""
  # У boky/postfix на 587 — часто самоподписанный TLS; для клиента внутри кластера к smtp-relay — true. Внешний SMTP — false.
  smtpTlsSkipVerify: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  # DNS (домен вроде qx-dev.ru), чтобы письма не уходили в спам — по возможности:
  # - TXT на apex: SPF v=spf1 ip4:<публичный_IP_исходящей_почты_кластера/NAT> ~all (или include провайдера).
  # - TXT _dmarc.qx-dev.ru: v=DMARC1; p=none; rua=mailto:postmaster@qx-dev.ru (позже усилить p=quarantine/reject).
  # - PTR (обратная зона) для того же IP как smtp.qx-dev.ru — у хостера/VPS.
  # - DKIM: образ boky/postfix не настраивает подпись из коробки; при необходимости отдельный relay с DKIM или доп. контейнер.

# Опциональный Redis в кластере (Service/Deployment qm-redis). По умолчанию выключен.
redis:
  enabled: false
  image: redis:7-alpine
