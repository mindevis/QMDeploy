{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qm-grafana-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qm.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: qm-project
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.monitoring.grafana.persistence.storage | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: qm-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    app: qm-grafana
    {{- include "qm.labels" . | nindent 4 }}
    app.kubernetes.io/part-of: qm-project
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: http
  selector:
    app: qm-grafana
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qm-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qm.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: qm-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qm-grafana
  template:
    metadata:
      labels:
        app: qm-grafana
        {{- include "qm.labels" . | nindent 8 }}
        app.kubernetes.io/part-of: qm-project
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: {{ .Values.monitoring.grafana.image | quote }}
          imagePullPolicy: IfNotPresent
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.monitoring.grafana.adminUser | quote }}
            - name: GF_SERVER_ROOT_URL
              value: {{ printf "%s://%s" .Values.monitoring.grafana.rootUrlScheme .Values.ingress.hosts.grafana | quote }}
            {{- if .Values.monitoring.grafana.installPlugins }}
            - name: GF_INSTALL_PLUGINS
              value: {{ .Values.monitoring.grafana.installPlugins | quote }}
            {{- end }}
            {{- if .Values.monitoring.grafana.adminPasswordPlain }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.monitoring.grafana.adminPasswordPlain | quote }}
            {{- else }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: qm-app
                  key: GRAFANA_ADMIN_PASSWORD
            {{- end }}
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.monitoring.grafana.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: qm-grafana-data
        - name: datasources
          configMap:
            name: qm-monitoring-grafana-datasources
{{- end }}
