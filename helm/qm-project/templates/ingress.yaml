apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qm-public
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qm.labels" . | nindent 4 }}
    app.kubernetes.io/part-of: qm-project
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
    - host: {{ .Values.ingress.hosts.api | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qmserver
                port:
                  number: 8080
    - host: {{ .Values.ingress.hosts.admin | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qmadmin
                port:
                  number: 80
    - host: {{ .Values.ingress.hosts.web | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qmweb
                port:
                  number: 80
    - host: {{ .Values.ingress.hosts.docs | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qmdocs
                port:
                  number: 80
    {{- if .Values.qmsecret.enabled }}
    - host: {{ .Values.ingress.hosts.key | default "key.qx-dev.ru" | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qmsecret
                port:
                  number: {{ .Values.qmsecret.port | default 9088 }}
    {{- end }}
    {{- if .Values.monitoring.enabled }}
    - host: {{ .Values.ingress.hosts.grafana | default "monit.qx-dev.ru" | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qm-grafana
                port:
                  number: 3000
    {{- end }}
    {{- if and .Values.phpmyadmin.enabled .Values.ingress.hosts.phpmyadmin }}
    - host: {{ .Values.ingress.hosts.phpmyadmin | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: phpmyadmin
                port:
                  number: 80
    {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.hosts.api | quote }}
        - {{ .Values.ingress.hosts.admin | quote }}
        - {{ .Values.ingress.hosts.web | quote }}
        - {{ .Values.ingress.hosts.docs | quote }}
        {{- if .Values.qmsecret.enabled }}
        - {{ .Values.ingress.hosts.key | default "key.qx-dev.ru" | quote }}
        {{- end }}
        {{- if .Values.monitoring.enabled }}
        - {{ .Values.ingress.hosts.grafana | default "monit.qx-dev.ru" | quote }}
        {{- end }}
        {{- if and .Values.phpmyadmin.enabled .Values.ingress.hosts.phpmyadmin }}
        - {{ .Values.ingress.hosts.phpmyadmin | quote }}
        {{- end }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
  {{- end }}
