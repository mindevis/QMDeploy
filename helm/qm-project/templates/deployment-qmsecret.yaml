{{- if .Values.qmsecret.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: qmsecret
  namespace: {{ .Release.Namespace }}
  labels:
    app: qmsecret
    {{- include "qm.labels" . | nindent 4 }}
    app.kubernetes.io/part-of: qm-project
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app: qmsecret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qmsecret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qm.labels" . | nindent 4 }}
    app.kubernetes.io/name: qmsecret
    app.kubernetes.io/part-of: qm-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qmsecret
  template:
    metadata:
      labels:
        app: qmsecret
        {{- include "qm.labels" . | nindent 8 }}
        app.kubernetes.io/part-of: qm-project
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: qmsecret
          {{- $img := include "qm.image" (list . "qmsecret") }}
          image: {{ $img | quote }}
          imagePullPolicy: {{ include "qm.imagePullPolicy" $img }}
          env:
            - name: LISTEN
              value: ":8080"
            - name: QMSECRET_DATA_DIR
              value: /data
            - name: QMSECRET_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: qm-app
                  key: QMSECRET_MASTER_KEY
            - name: QMSECRET_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: qm-app
                  key: QMSECRET_SERVICE_TOKEN
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.qmsecret.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: qmsecret-data
{{- end }}
