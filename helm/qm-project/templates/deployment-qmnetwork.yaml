{{- $qmn := .Values.qmnetwork | default dict }}
{{- $qmnPort := $qmn.port | default 9087 }}
apiVersion: v1
kind: Service
metadata:
  name: qmnetwork
  namespace: {{ .Release.Namespace }}
  labels:
    app: qmnetwork
    {{- include "qm.labels" . | nindent 4 }}
    app.kubernetes.io/part-of: qm-project
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ $qmnPort }}
      targetPort: http
  selector:
    app: qmnetwork
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qmnetwork
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qm.labels" . | nindent 4 }}
    app.kubernetes.io/name: qmnetwork
    app.kubernetes.io/part-of: qm-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qmnetwork
  template:
    metadata:
      labels:
        app: qmnetwork
        {{- include "qm.labels" . | nindent 8 }}
        app.kubernetes.io/part-of: qm-project
{{- include "qm.podImageRevisionBlock" (list . "qmnetwork") }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: qmnetwork
          {{- $img := include "qm.image" (list . "qmnetwork") }}
          image: {{ $img | quote }}
          imagePullPolicy: {{ include "qm.imagePullPolicy" $img }}
          envFrom:
            - configMapRef:
                name: qm-qmnetwork-config
          env:
            - name: LISTEN
              value: {{ printf ":%v" $qmnPort | quote }}
            {{- if $qmn.mysqlDsn }}
            - name: QMNETWORK_MYSQL_DSN
              value: {{ $qmn.mysqlDsn | quote }}
            {{- else }}
            - name: QMNETWORK_MYSQL_DSN
              valueFrom:
                secretKeyRef:
                  name: qm-app
                  key: QMNETWORK_MYSQL_DSN
            {{- end }}
            - name: QMNETWORK_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: qm-app
                  key: QMNETWORK_SMTP_PASSWORD
                  optional: true
            - name: QMNETWORK_INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: qm-app
                  key: QMNETWORK_INTERNAL_SECRET
                  optional: true
          ports:
            - name: http
              containerPort: {{ $qmnPort }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- if $qmn.resources }}
            {{- toYaml $qmn.resources | nindent 12 }}
            {{- else }}
            {{- include "qm.qmnetwork.defaultResources" . | nindent 12 }}
            {{- end }}
