{{- $qmn := .Values.qmnetwork | default dict }}
{{- $qmnPort := $qmn.port | default 9087 }}
{{- $rd := .Values.redis | default dict }}
{{- $redisAddr := $qmn.redisAddr | default "" | trim }}
{{- if and ($rd.enabled | default false) (eq $redisAddr "") }}
{{- $redisAddr = "qm-redis:6379" }}
{{- end }}
{{- $redisDb := $qmn.redisDb | default 0 | int }}
apiVersion: v1
kind: Service
metadata:
  name: qmnetwork
  namespace: {{ .Release.Namespace }}
  labels:
    app: qmnetwork
    {{- include "qm.labels" . | nindent 4 }}
    app.kubernetes.io/part-of: qm-project
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ $qmnPort }}
      targetPort: http
  selector:
    app: qmnetwork
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qmnetwork
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qm.labels" . | nindent 4 }}
    app.kubernetes.io/name: qmnetwork
    app.kubernetes.io/part-of: qm-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qmnetwork
  template:
    metadata:
      labels:
        app: qmnetwork
        {{- include "qm.labels" . | nindent 8 }}
        app.kubernetes.io/part-of: qm-project
{{- include "qm.podImageRevisionBlock" (list . "qmnetwork") }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              for i in $(seq 1 90); do
                if nc -z mysql 3306; then exit 0; fi
                sleep 2
              done
              exit 1
{{- if ne $redisAddr "" }}
        - name: wait-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              hostport="{{ $redisAddr }}"
              host="${hostport%%:*}"
              port="${hostport##*:}"
              for i in $(seq 1 60); do
                if nc -z "$host" "$port"; then exit 0; fi
                sleep 2
              done
              exit 1
{{- end }}
      containers:
        - name: qmnetwork
          {{- $img := include "qm.image" (list . "qmnetwork") }}
          image: {{ $img | quote }}
          imagePullPolicy: {{ include "qm.imagePullPolicy" $img }}
          envFrom:
            - configMapRef:
                name: qm-qmnetwork-config
          env:
            - name: LISTEN
              value: {{ printf ":%v" $qmnPort | quote }}
            {{- if $qmn.mysqlDsn }}
            - name: QMNETWORK_MYSQL_DSN
              value: {{ $qmn.mysqlDsn | quote }}
            {{- else }}
            - name: QMNETWORK_MYSQL_DSN
              valueFrom:
                secretKeyRef:
                  name: qm-app
                  key: QMNETWORK_MYSQL_DSN
            {{- end }}
            - name: QMNETWORK_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.smtpRelay.enabled }}
                  name: smtp-relay-auth
                  key: QMNETWORK_SMTP_PASSWORD
                  {{- else }}
                  name: qm-app
                  key: QMNETWORK_SMTP_PASSWORD
                  optional: true
                  {{- end }}
            - name: QMNETWORK_INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: qm-app
                  key: QMNETWORK_INTERNAL_SECRET
                  optional: true
{{- if ne $redisAddr "" }}
            - name: QMNETWORK_REDIS_ADDR
              value: {{ $redisAddr | quote }}
{{- $rsec := $qmn.redisPasswordSecret | default dict }}
{{- if $rsec.name }}
            - name: QMNETWORK_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $rsec.name | quote }}
                  key: {{ $rsec.key | default "password" | quote }}
{{- else if $qmn.redisPassword }}
            - name: QMNETWORK_REDIS_PASSWORD
              value: {{ $qmn.redisPassword | quote }}
{{- end }}
{{- if ne $redisDb 0 }}
            - name: QMNETWORK_REDIS_DB
              value: {{ $redisDb | quote }}
{{- end }}
{{- end }}
          ports:
            - name: http
              containerPort: {{ $qmnPort }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- if $qmn.resources }}
            {{- toYaml $qmn.resources | nindent 12 }}
            {{- else }}
            {{- include "qm.qmnetwork.defaultResources" . | nindent 12 }}
            {{- end }}
